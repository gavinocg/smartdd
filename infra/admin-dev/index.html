<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMARTDD Admin</title>
    <style>
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f0f4f8; color: #1a202c; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .badge { background: #48bb78; color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; display: inline-block; margin-bottom: 1rem; }
        h1 { margin: 0 0 0.5rem; font-size: 1.5rem; }
        p { color: #718096; margin: 0 0 1.5rem; }
        .status { color: #38a169; font-weight: 600; }
        code { background: #edf2f7; padding: 2px 6px; border-radius: 4px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="badge">SMARTDD</div>
        <h1>Admin Panel</h1>
        <p>Panel de administración en desarrollo</p>
        <p class="status">&#10003; Servicio activo</p>
        <p><code>http://192.168.100.101:81</code></p>
    </div>
</body>
</html>
